<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mourish Star | Premium Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; color: #fff; margin: 0; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        .app-shell { display: flex; height: 100vh; width: 100vw; }

        .nav-system {
            background: rgba(8, 8, 8, 0.98);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; z-index: 100;
        }

        @media (orientation: portrait) {
            .app-shell { flex-direction: column-reverse; }
            .nav-system {
                width: 100vw; height: 75px;
                flex-direction: row; justify-content: space-around;
                padding: 0 15px; border-top: 1px solid rgba(255,255,255,0.1);
            }
            .sidebar-logo { display: none; }
            .grid-layout { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        @media (orientation: landscape) {
            .app-shell { flex-direction: row; }
            .nav-system {
                width: 85px; height: 100vh;
                flex-direction: column; align-items: center;
                padding: 30px 0; border-right: 1px solid rgba(255,255,255,0.1);
            }
            .grid-layout { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        }

        .content-scroll {
            flex: 1; overflow-y: auto; padding: 30px;
            background: radial-gradient(circle at top right, #0a1120, #000);
        }

        .movie-card:hover img { transform: scale(1.05); }
        .action-btn {
            transform: translateY(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .movie-card:hover .action-btn {
            transform: translateY(0);
            opacity: 1;
        }

        .search-bar-container {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .search-bar-container.active {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 2rem;
        }

        .shimmer {
            background: linear-gradient(90deg, #050505 25%, #151515 50%, #050505 75%);
            background-size: 200% 100%; animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="nav-system">
            <div class="sidebar-logo w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black mb-10 shadow-lg shadow-blue-600/20">M</div>
            <nav class="flex flex-row landscape:flex-col gap-10 opacity-60 items-center text-xl">
                <button onclick="window.location.reload()" class="hover:scale-110 transition-transform">🏠</button>
                <button onclick="toggleSearch()" class="hover:scale-110 transition-transform">🔍</button>
                <button class="text-blue-500 hover:scale-110 transition-transform">📥</button> 
            </nav>
            <div class="landscape:mt-auto">
                <div class="w-10 h-10 rounded-full border border-blue-500/30 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mourish" alt="User">
                </div>
            </div>
        </aside>

        <main class="content-scroll no-scrollbar">
            <header class="flex flex-col mb-10 gap-6">
                <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                    <div>
                        <h1 class="text-4xl font-black tracking-tighter">Mourish <span class="text-blue-500">Star</span></h1>
                        <p id="status-text" class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[9px] mt-2">Ultra HD Streaming Active</p>
                    </div>
                    <div class="flex gap-3 overflow-x-auto no-scrollbar w-full md:max-w-xl" id="lang-tags"></div>
                </div>

                <div id="search-container" class="search-bar-container">
                    <div class="relative w-full max-w-2xl">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                        <input type="text" id="search-input" 
                               oninput="handleSearch(this.value)"
                               placeholder="Type movie name..." 
                               class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                    </div>
                </div>
            </header>

            <div id="results-grid" class="grid-layout grid"></div>
        </main>
    </div>

    <div id="player-overlay" class="fixed inset-0 bg-black z-[200] hidden flex flex-col">
        <div class="absolute top-0 left-0 right-0 p-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent z-10 opacity-0 hover:opacity-100 transition-opacity duration-300">
            <div>
                <h2 id="playing-title" class="text-xl font-bold text-white">...</h2>
                <div class="flex gap-4 items-center">
                    <button id="dl-btn-player" class="text-blue-400 text-[10px] font-black uppercase tracking-widest hover:text-white">↓ Download 4K</button>
                    <span class="text-white/30 text-[10px]">|</span>
                    <button onclick="toggleInternalFullscreen()" class="text-white/50 text-[10px] font-black uppercase tracking-widest hover:text-white">⛶ Toggle Fullscreen</button>
                </div>
            </div>
            <button onclick="closePlayer()" class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-full text-3xl hover:bg-red-600 transition-all">&times;</button>
        </div>
        <div id="player-container" class="flex-1 w-full h-full bg-black"></div>
    </div>

    <script>
        const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJjNDYyM2M4ZWU4YzRkNmJjNWMxNzQyMGYwMGQ5YzE3ZSIsIm5iZiI6MTc3NzA0Mzg3Ni4zODIwMDAyLCJzdWIiOiI2OWViODlhNDYwYmJmMDk5MTQwMjg0N2YiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.ka7Dpz7vxBK-x3rWCGE27HgMoXaVRDw4TVSn86_cj-g";
        let activeLang = 'ta';
        let searchTimeout = null;

        function init() {
            const tags = document.getElementById('lang-tags');
            const langs = [{code:'ta', name:'Tamil'}, {code:'hi', name:'Hindi'}, {code:'en', name:'English'}, {code:'te', name:'Telugu'}];
            tags.innerHTML = langs.map(l => `
                <button onclick="changeLang('${l.code}', this)" class="px-6 py-2 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest transition-all ${l.code === activeLang ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/40' : 'bg-white/5 text-white/60'}">
                    ${l.name}
                </button>
            `).join('');
            loadMovies();
        }

        function toggleSearch() {
            const container = document.getElementById('search-container');
            container.classList.toggle('active');
            if(container.classList.contains('active')) {
                document.getElementById('search-input').focus();
            }
        }

        function handleSearch(query) {
            clearTimeout(searchTimeout);
            if (!query) {
                loadMovies();
                document.getElementById('status-text').innerText = "Ultra HD Streaming Active";
                return;
            }
            
            document.getElementById('status-text').innerText = `Searching for: ${query}`;
            searchTimeout = setTimeout(() => executeSearch(query), 500);
        }

        async function executeSearch(query) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = Array(8).fill(0).map(() => `<div class="shimmer aspect-[2/3] rounded-[2rem]"></div>`).join('');
            
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(query)}&include_adult=false&language=en-US&page=1`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();
                renderGrid(data.results);
            } catch (err) {
                console.error("Search failed");
            }
        }

        async function loadMovies() {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = Array(12).fill(0).map(() => `<div class="shimmer aspect-[2/3] rounded-[2rem]"></div>`).join('');
            
            try {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?with_original_language=${activeLang}&sort_by=popularity.desc&region=IN`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();
                renderGrid(data.results);
            } catch (err) {
                console.error("Failed to fetch movies");
            }
        }

        function renderGrid(movies) {
            const grid = document.getElementById('results-grid');
            if(movies.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40 font-bold">No movies found. Try another search.</div>`;
                return;
            }
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card group cursor-pointer relative">
                    <div class="relative overflow-hidden rounded-[2rem] aspect-[2/3] border border-white/5 shadow-2xl transition-all duration-500">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover transition-transform duration-700">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center gap-4 transition-all duration-300">
                            <button onclick="watchMovie(${m.id}, '${m.title.replace(/'/g, "")}')" class="action-btn bg-white text-black px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-tighter">▶ Watch Now</button>
                            <button onclick="downloadMovie(${m.id})" class="action-btn bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-tighter">↓ Download</button>
                        </div>
                    </div>
                    <p class="text-[11px] font-bold mt-4 text-center truncate px-2 opacity-60 tracking-tight">${m.title}</p>
                </div>
            `).join('');
        }

        function watchMovie(id, title) {
            const overlay = document.getElementById('player-overlay');
            const container = document.getElementById('player-container');
            document.getElementById('playing-title').innerText = title;
            document.getElementById('dl-btn-player').onclick = () => downloadMovie(id);
            container.innerHTML = `<iframe src="https://vidsrc.me/embed/movie?tmdb=${id}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
            overlay.classList.remove('hidden');
            requestFullScreen(overlay);
        }

        function requestFullScreen(element) {
            if (element.requestFullscreen) element.requestFullscreen();
            else if (element.webkitRequestFullscreen) element.webkitRequestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }

        function toggleInternalFullscreen() {
            if (!document.fullscreenElement) requestFullScreen(document.getElementById('player-overlay'));
            else document.exitFullscreen();
        }

        function closePlayer() {
            const overlay = document.getElementById('player-overlay');
            overlay.classList.add('hidden');
            document.getElementById('player-container').innerHTML = '';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function downloadMovie(id) {
            window.open(`https://vidsrc.me/download/movie?tmdb=${id}`, '_blank');
        }

        function changeLang(code, el) {
            activeLang = code;
            document.getElementById('search-input').value = "";
            document.getElementById('search-container').classList.remove('active');
            document.querySelectorAll('#lang-tags button').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                b.classList.add('bg-white/5', 'text-white/60');
            });
            el.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
            loadMovies();
        }

        window.onload = init;
    </script>
</body>
</html>
